<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daftar — EnglishPro</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-body">

  <div class="auth-container">

    <!-- LEFT PANEL -->
    <div class="auth-panel-left">
      <a href="index.html" class="auth-back">
        <i class="fas fa-arrow-left"></i> Kembali
      </a>
      <div class="auth-brand">
        <span class="brand-icon-lg">✦</span>
        <span class="auth-brand-name">English<em>Pro</em></span>
      </div>
      <blockquote class="auth-quote">
        "Learning another language is not only learning different words for the same things, but learning another way to think."
        <cite>— Flora Lewis</cite>
      </blockquote>
      <div class="auth-panel-deco"></div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="auth-panel-right">
      <div class="auth-form-wrap">
        <h2 class="auth-title">Buat Akun Baru ✨</h2>
        <p class="auth-subtitle">Bergabung dengan EnglishPro sekarang</p>

        <div id="toast" class="toast hidden"></div>

        <form id="registerForm" novalidate>
          <!-- Nama Lengkap -->
          <div class="form-group">
            <label for="fullname">Nama Lengkap</label>
            <div class="input-wrap">
              <i class="fas fa-id-card input-icon"></i>
              <input type="text" id="fullname" placeholder="Masukkan nama lengkap"/>
            </div>
            <span class="field-error" id="err-fullname"></span>
          </div>

          <!-- Username -->
          <div class="form-group">
            <label for="username">Username</label>
            <div class="input-wrap">
              <i class="fas fa-user input-icon"></i>
              <input type="text" id="username" placeholder="Buat username unik"/>
            </div>
            <span class="field-error" id="err-username"></span>
          </div>

          <!-- Role -->
          <div class="form-group">
            <label for="role">Role</label>
            <div class="input-wrap">
              <i class="fas fa-user-tag input-icon"></i>
              <select id="role">
                <option value="user">Murid / Orang Tua</option>
                <option value="admin">Admin (Guru)</option>
              </select>
            </div>
            <span class="field-error" id="err-role"></span>
          </div>

          <!-- Admin Key (conditional) -->
          <div class="form-group hidden" id="adminKeyGroup">
            <label for="adminKey">Kode Admin</label>
            <div class="input-wrap">
              <i class="fas fa-key input-icon"></i>
              <input type="password" id="adminKey" placeholder="Masukkan kode khusus admin"/>
            </div>
            <span class="field-error" id="err-adminKey"></span>
            <small class="field-hint">Kode admin: <code>ENGLISHPRO2025</code></small>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrap">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" id="password" placeholder="Min. 6 karakter"/>
              <button type="button" class="toggle-pw" id="togglePw" aria-label="Tampilkan password">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <span class="field-error" id="err-password"></span>
            <div class="password-strength" id="strengthBar">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <span class="strength-label" id="strengthLabel"></span>
          </div>

          <!-- Confirm Password -->
          <div class="form-group">
            <label for="confirmPassword">Konfirmasi Password</label>
            <div class="input-wrap">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" id="confirmPassword" placeholder="Ulangi password"/>
            </div>
            <span class="field-error" id="err-confirmPassword"></span>
          </div>

          <button type="submit" class="btn-submit" id="btnRegister">
            <span class="btn-text">Daftar Sekarang</span>
            <i class="fas fa-arrow-right"></i>
          </button>
        </form>

        <p class="auth-switch">
          Sudah punya akun? <a href="login.html">Masuk di sini</a>
        </p>
      </div>
    </div>

  </div>

  <script src="js/script.js"></script>
  <script>
    // Redirect jika sudah login
    const session = JSON.parse(sessionStorage.getItem('currentUser') || 'null');
    if (session) window.location.href = 'dashboard.html';

    // Toggle admin key field
    document.getElementById('role').addEventListener('change', function () {
      const adminGroup = document.getElementById('adminKeyGroup');
      adminGroup.classList.toggle('hidden', this.value !== 'admin');
    });

    // Toggle password visibility
    document.getElementById('togglePw').addEventListener('click', function () {
      const pw = document.getElementById('password');
      const icon = this.querySelector('i');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        pw.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    // Password strength meter
    document.getElementById('password').addEventListener('input', function () {
      const pw = this.value;
      const fill = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      let strength = 0;
      if (pw.length >= 6) strength++;
      if (pw.length >= 10) strength++;
      if (/[A-Z]/.test(pw)) strength++;
      if (/[0-9]/.test(pw)) strength++;
      if (/[^A-Za-z0-9]/.test(pw)) strength++;

      const levels = ['', 'Sangat Lemah', 'Lemah', 'Sedang', 'Kuat', 'Sangat Kuat'];
      const colors = ['', '#ef4444', '#f97316', '#eab308', '#22c55e', '#16a34a'];
      const widths = ['0%', '20%', '40%', '60%', '80%', '100%'];

      fill.style.width = widths[strength] || '0%';
      fill.style.background = colors[strength] || 'transparent';
      label.textContent = levels[strength] || '';
      label.style.color = colors[strength] || '';
    });

    // Register form submission
    document.getElementById('registerForm').addEventListener('submit', function (e) {
      e.preventDefault();
      clearErrors();

      const fullname = document.getElementById('fullname').value.trim();
      const username = document.getElementById('username').value.trim();
      const role = document.getElementById('role').value;
      const adminKey = document.getElementById('adminKey').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      let valid = true;

      // Validasi
      if (!fullname) { showFieldError('err-fullname', 'Nama lengkap wajib diisi'); valid = false; }
      if (!username) { showFieldError('err-username', 'Username wajib diisi'); valid = false; }
      else if (username.length < 3) { showFieldError('err-username', 'Username minimal 3 karakter'); valid = false; }

      if (role === 'admin' && adminKey !== 'ENGLISHPRO2025') {
        showFieldError('err-adminKey', 'Kode admin salah!'); valid = false;
      }
      if (!password) { showFieldError('err-password', 'Password wajib diisi'); valid = false; }
      else if (password.length < 6) { showFieldError('err-password', 'Password minimal 6 karakter'); valid = false; }
      if (password !== confirmPassword) { showFieldError('err-confirmPassword', 'Password tidak cocok'); valid = false; }
      if (!valid) return;

      // Cek username sudah ada
      const users = getUsers();
      if (users.find(u => u.username === username)) {
        showFieldError('err-username', 'Username sudah digunakan');
        return;
      }

      // Simpan user baru
      const newUser = { id: Date.now(), fullname, username, password, role };
      users.push(newUser);
      saveUsers(users);

      showToast('Akun berhasil dibuat! Mengarahkan ke login...', 'success');
      const btn = document.getElementById('btnRegister');
      btn.disabled = true;
      btn.querySelector('.btn-text').textContent = 'Mendaftar...';

      setTimeout(() => { window.location.href = 'login.html'; }, 1500);
    });
  </script>
</body>
</html>
